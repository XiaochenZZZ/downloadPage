name: 自动打包 EXE

# 触发条件：推送到 main 分支时，且修改了 .py 文件或依赖文件
on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/requirements.txt'
      - '**/download_xls.py'   # 可按需要调整

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包为 EXE
        run: |
          pyinstaller --onefile --name download_xls download_xls.py

      - name: 上传 EXE 为 Artifact（可在 Actions 页面下载）
        uses: actions/upload-artifact@v4
        with:
          name: download_xls-${{ github.run_id }}
          path: dist/download_xls.exe
